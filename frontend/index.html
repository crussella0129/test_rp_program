<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red Planet Mission Control</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0005;
      color: #e8d5b0;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }
    h1 {
      color: #c1440e;
      font-size: 1.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .subtitle {
      color: #7a5c3a;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      margin-bottom: 2.5rem;
    }
    .panel {
      background: #120008;
      border: 1px solid #3a1a0a;
      border-radius: 4px;
      padding: 1.5rem;
      width: 100%;
      max-width: 560px;
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: #7a5c3a;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }
    textarea {
      width: 100%;
      background: #0a0005;
      border: 1px solid #3a1a0a;
      color: #e8d5b0;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      padding: 0.6rem;
      border-radius: 2px;
      resize: vertical;
      min-height: 80px;
    }
    textarea:focus { outline: 1px solid #c1440e; }
    button {
      margin-top: 1rem;
      background: #c1440e;
      color: #fff;
      border: none;
      padding: 0.6rem 1.6rem;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
    }
    button:hover { background: #e05015; }
    button:disabled { background: #3a1a0a; cursor: not-allowed; }
    .results { display: none; }
    .results.visible { display: block; }
    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 0.45rem 0;
      border-bottom: 1px solid #1e0a10;
      font-size: 0.9rem;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: #7a5c3a; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.1em; }
    .stat-value { color: #c1440e; font-weight: bold; }
    .error-msg { color: #ff4444; font-size: 0.85rem; margin-top: 0.8rem; }
    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
      margin-right: 0.4rem;
    }
    .status-dot.ok { background: #4caf50; }
    .health-line { font-size: 0.75rem; color: #7a5c3a; margin-bottom: 2rem; }
  </style>
</head>
<body>
  <h1>&#9651; Red Planet Mission Control</h1>
  <p class="subtitle">Ferric Layer — Telemetry Analysis Terminal</p>

  <p class="health-line">
    <span class="status-dot" id="dot"></span>
    <span id="health-msg">Connecting to mission backend…</span>
  </p>

  <div class="panel">
    <label for="readings">Telemetry Readings (comma-separated)</label>
    <textarea id="readings" placeholder="e.g. 23.1, 45.7, 18.3, 67.2, 34.8, 89.0, 56.4"></textarea>
    <button id="analyze-btn" onclick="analyze()">Analyze</button>
    <p class="error-msg" id="error"></p>
  </div>

  <div class="panel results" id="results">
    <label>Statistics</label>
    <div id="stat-rows"></div>
  </div>

  <script>
    const STAT_LABELS = [
      ['count', 'Count'],
      ['mean', 'Mean'],
      ['median', 'Median'],
      ['std_dev', 'Std Dev'],
      ['min', 'Min'],
      ['max', 'Max'],
    ];

    async function checkHealth() {
      try {
        const r = await fetch('/api/health');
        const data = await r.json();
        document.getElementById('dot').className = 'status-dot ok';
        document.getElementById('health-msg').textContent =
          'Connected — Mission: ' + data.mission;
      } catch (_) {
        document.getElementById('health-msg').textContent = 'Backend offline';
      }
    }

    async function analyze() {
      const raw = document.getElementById('readings').value.trim();
      const errEl = document.getElementById('error');
      errEl.textContent = '';

      const nums = raw.split(',').map(s => parseFloat(s.trim())).filter(n => !isNaN(n));
      if (nums.length === 0) {
        errEl.textContent = 'Enter at least one numeric reading.';
        return;
      }

      const btn = document.getElementById('analyze-btn');
      btn.disabled = true;
      btn.textContent = 'Analyzing…';

      try {
        const r = await fetch('/api/stats', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ readings: nums }),
        });
        if (!r.ok) throw new Error(await r.text());
        renderStats(await r.json());
      } catch (e) {
        errEl.textContent = 'Error: ' + e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Analyze';
      }
    }

    function renderStats(data) {
      const container = document.getElementById('stat-rows');
      container.textContent = '';
      for (const [key, label] of STAT_LABELS) {
        const row = document.createElement('div');
        row.className = 'stat-row';

        const lbl = document.createElement('span');
        lbl.className = 'stat-label';
        lbl.textContent = label;

        const val = document.createElement('span');
        val.className = 'stat-value';
        val.textContent = data[key];

        row.appendChild(lbl);
        row.appendChild(val);
        container.appendChild(row);
      }
      document.getElementById('results').classList.add('visible');
    }

    checkHealth();
  </script>
</body>
</html>
